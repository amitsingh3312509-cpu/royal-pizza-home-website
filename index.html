<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#0d47a1;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:none;
}

.photo-preview{
    width:120px;
    height:120px;
    border:2px dashed #999;
    border-radius:10px;
    margin:15px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    color:#777;
}

.photo-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0d47a1;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#08306b;
}

footer{
    text-align:center;
    margin-top:20px;
    color:white;
}

@media(max-width:600px){
    .container{
        padding:20px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>📚 My Library</h1>
    <p class="subtitle">Student Registration Form</p>

    <!-- Apna email yahan daalein -->
    <form action="https://formsubmit.co/amitsingh3312509@gmail.com"
          method="POST"
          enctype="multipart/form-data">

        <label>Student Name</label>
        <input type="text"
               name="Student Name"
               placeholder="Enter Student Name"
               required>

        <label>Student Email</label>
        <input type="email"
               name="Student Email"
               placeholder="Enter Email Address"
               required>

        <label>Mobile Number</label>
        <input type="tel"
               name="Mobile Number"
               placeholder="Enter Mobile Number"
               pattern="[0-9]{10}"
               required>

        <label>Alternate Mobile Number</label>
        <input type="tel"
               name="Alternate Number"
               placeholder="Enter Alternate Number"
               pattern="[0-9]{10}">

        <label>Father Name</label>
        <input type="text"
               name="Father Name"
               placeholder="Enter Father Name"
               required>

        <label>Mother Name</label>
        <input type="text"
               name="Mother Name"
               placeholder="Enter Mother Name"
               required>

        <label>Address</label>
        <textarea name="Address"
                  rows="4"
                  placeholder="Enter Full Address"
                  required></textarea>

        <label>Upload Student Photo</label>

        <div class="photo-preview" id="preview">
            Photo Preview
        </div>

        <input type="file"
               id="photo"
               name="Student Photo"
               accept="image/*"
               required>

        <!-- FormSubmit Settings -->
        <input type="hidden"
               name="_subject"
               value="New Library Registration">

        <input type="hidden"
               name="_template"
               value="table">

        <input type="hidden"
               name="_captcha"
               value="false">

        <input type="hidden"
               name="_autoresponse"
               value="Dear Student, your registration in our library has been successfully completed. Thank you for joining our library.">

        <button type="submit">Register Now</button>

    </form>

</div>

<footer>
    © 2026 My Library | All Rights Reserved
</footer>

<script>
const photo = document.getElementById("photo");
const preview = document.getElementById("preview");

photo.addEventListener("change", function() {

    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.addEventListener("load", function(){
            preview.innerHTML =
            `<img src="${this.result}" alt="Photo">`;
        });

        reader.readAsDataURL(file);
    }
});
</script>

</body>
  </html>
